name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  WEBHOOK_URL: https://webhook.site/45a3accb-16a6-47e2-a931-6ae0cdbc20d4

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/checkout] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/checkout] Cloned repo. Files: $(ls /tmp/repo | tr '\n' ' ')"

      - name: Install Lint Tools
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/install-tools] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          pip install flake8 black 2>&1 | tail -3 | while read -r line; do
            curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "[lint/install-tools] $line"
          done

      - name: Run Flake8
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/flake8] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          RESULT=$(flake8 /tmp/repo/src/ --max-line-length=120 2>&1 || true)
          if [ -z "$RESULT" ]; then
            curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
              -d "[lint/flake8] PASSED - no issues found"
          else
            curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
              -d "[lint/flake8] OUTPUT: $RESULT"
          fi

      - name: Run Black Check
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/black] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          RESULT=$(black --check /tmp/repo/src/ 2>&1 || true)
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/black] OUTPUT: $RESULT"

      - name: Keep Alive
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint/keep-alive] Sleeping 300s at $(date '+%Y-%m-%d %H:%M:%S')"
          sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:

      - name: Checkout Repository
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/checkout] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/checkout] Cloned at $(date '+%H:%M:%S'). Ref: ${{ github.sha }}"

      - name: Install Dependencies
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/install-deps] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          pip install -r /tmp/repo/requirements.txt 2>&1 | tail -5 | while read -r line; do
            curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "[build/install-deps] $line"
          done

      - name: Verify Project Structure
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/verify-structure] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          for f in src/app.py src/utils.py tests/test_app.py tests/test_utils.py requirements.txt; do
            if [ -f "/tmp/repo/$f" ]; then
              curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
                -d "[build/verify-structure] FOUND: $f"
            else
              curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
                -d "[build/verify-structure] MISSING: $f"
            fi
          done

      - name: Import Check
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/import-check] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          RESULT=$(cd /tmp/repo && python3 -c "from src.app import add, subtract, multiply, divide; from src.utils import is_even, clamp, flatten; print('All imports OK')" 2>&1)
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/import-check] $RESULT"

      - name: Keep Alive
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build/keep-alive] Sleeping 300s at $(date '+%Y-%m-%d %H:%M:%S')"
          sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Checkout and Install
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/checkout-install] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          pip install -r /tmp/repo/requirements.txt -q
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/checkout-install] Checkout + install complete at $(date '+%H:%M:%S')"

      - name: Run Unit Tests
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/unit-tests] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          cd /tmp/repo
          RESULT=$(python3 -m pytest tests/ -v 2>&1)
          PASSED=$(echo "$RESULT" | grep -c "PASSED" || true)
          FAILED=$(echo "$RESULT" | grep -c "FAILED" || true)
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/unit-tests] Results: $PASSED passed, $FAILED failed"

          echo "$RESULT"

      - name: Run Coverage Report
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/coverage] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          cd /tmp/repo
          RESULT=$(python3 -m pytest tests/ --cov=src --cov-report=term-missing 2>&1)
          COVERAGE=$(echo "$RESULT" | grep "TOTAL" | awk '{print $NF}' || echo "unknown")
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/coverage] Total coverage: $COVERAGE"

          echo "$RESULT"

      - name: Keep Alive
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test/keep-alive] Sleeping 300s at $(date '+%Y-%m-%d %H:%M:%S')"
          sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — SECURITY
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Checkout Repository
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/checkout] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/checkout] Repo ready at $(date '+%H:%M:%S')"

      - name: Install Bandit
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/install-bandit] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          pip install bandit -q
          VERSION=$(bandit --version 2>&1 | head -1)
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/install-bandit] Installed: $VERSION"

      - name: Run Bandit Scan
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/bandit-scan] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          RESULT=$(bandit -r /tmp/repo/src/ -f txt 2>&1 || true)
          ISSUES=$(echo "$RESULT" | grep "Issue:" | wc -l | tr -d ' ')
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/bandit-scan] Scan complete. Issues found: $ISSUES"

          echo "$RESULT"

      - name: Check for Hardcoded Secrets
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/secrets-check] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          PATTERNS="password=|secret=|api_key=|token=|private_key="
          HITS=$(grep -rniE "$PATTERNS" /tmp/repo/src/ 2>/dev/null | wc -l | tr -d ' ')
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/secrets-check] Pattern matches for secrets: $HITS"

      - name: Keep Alive
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security/keep-alive] Sleeping 300s at $(date '+%Y-%m-%d %H:%M:%S')"
          sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security
    steps:

      - name: Checkout Repository
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/checkout] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/checkout] Cloned commit ${{ github.sha }} at $(date '+%H:%M:%S')"

      - name: Validate Config
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/validate-config] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          ERRORS=0
          for required in src/app.py src/utils.py requirements.txt; do
            if [ ! -f "/tmp/repo/$required" ]; then
              curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
                -d "[deploy/validate-config] MISSING required file: $required"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -eq 0 ]; then
            curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
              -d "[deploy/validate-config] All required files present. Validation PASSED"
          fi

      - name: Package Artifact
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/package] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          ARTIFACT="/tmp/release-${{ github.run_number }}.tar.gz"
          tar -czf "$ARTIFACT" -C /tmp/repo src/ requirements.txt README.md
          SIZE=$(du -sh "$ARTIFACT" | cut -f1)
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/package] Artifact created: $ARTIFACT (size: $SIZE)"

      - name: Verify Artifact
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/verify-artifact] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

          ARTIFACT="/tmp/release-${{ github.run_number }}.tar.gz"
          CONTENTS=$(tar -tzf "$ARTIFACT" 2>&1)
          FILE_COUNT=$(echo "$CONTENTS" | wc -l | tr -d ' ')
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/verify-artifact] Artifact verified. Contains $FILE_COUNT entries. DEPLOY READY"

          echo "$CONTENTS"

      - name: Keep Alive
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy/keep-alive] Sleeping 300s at $(date '+%Y-%m-%d %H:%M:%S')"
          sleep 60
