name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# Real-time log streaming via Ably (one persistent WebSocket connection per
# job, each line published as a message the instant it's produced).
env:
  ABLY_CHANNEL: "gh-actions-logs"
  ABLY_SEND_SCRIPT: |
    import asyncio
    import os
    import sys
    from ably import AblyRealtime

    async def main():
        client = AblyRealtime(os.environ["ABLY_API_KEY"])
        channel = client.channels.get(os.environ["ABLY_CHANNEL"])
        for line in sys.stdin:
            line = line.rstrip("\n")
            if line:
                await channel.publish("log", line)
        await client.close()

    asyncio.run(main())

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:

      - name: Install Ably Client
        run: |
          pip install -q ably
          echo "$ABLY_SEND_SCRIPT" > /tmp/ably_send.py

      - name: Run Lint (streamed live)
        env:
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
        run: |
          {
            echo "[lint] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

            echo "[lint] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1

            echo "[lint] === pip install flake8 black ==="
            pip install flake8 black 2>&1

            echo "[lint] === flake8 ==="
            flake8 /tmp/repo/src/ --max-line-length=120 2>&1 || true

            echo "[lint] === black check ==="
            black --check /tmp/repo/src/ 2>&1 || true

            echo "[lint] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } | python3 /tmp/ably_send.py

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:

      - name: Install Ably Client
        run: |
          pip install -q ably
          echo "$ABLY_SEND_SCRIPT" > /tmp/ably_send.py

      - name: Run Build (streamed live)
        env:
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
        run: |
          {
            echo "[build] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

            echo "[build] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1

            echo "[build] === pip install dependencies ==="
            pip install -r /tmp/repo/requirements.txt 2>&1

            echo "[build] === project structure check ==="
            for f in src/app.py src/utils.py tests/test_app.py tests/test_utils.py requirements.txt; do
              if [ -f "/tmp/repo/$f" ]; then
                echo "  FOUND: $f"
              else
                echo "  MISSING: $f"
              fi
            done

            echo "[build] === import check ==="
            cd /tmp/repo && python3 -c "from src.app import add, subtract, multiply, divide; from src.utils import is_even, clamp, flatten; print('All imports OK')" 2>&1

            echo "[build] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } | python3 /tmp/ably_send.py

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Install Ably Client
        run: |
          pip install -q ably
          echo "$ABLY_SEND_SCRIPT" > /tmp/ably_send.py

      - name: Run Tests (streamed live)
        env:
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
        run: |
          {
            echo "[test] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

            echo "[test] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1

            echo "[test] === pip install ==="
            pip install -r /tmp/repo/requirements.txt 2>&1

            echo "[test] === pytest ==="
            cd /tmp/repo && python3 -m pytest tests/ -v 2>&1

            echo "[test] === coverage ==="
            cd /tmp/repo && python3 -m pytest tests/ --cov=src --cov-report=term-missing 2>&1

            echo "[test] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } | python3 /tmp/ably_send.py

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — SECURITY
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Install Ably Client
        run: |
          pip install -q ably
          echo "$ABLY_SEND_SCRIPT" > /tmp/ably_send.py

      - name: Run Security Scan (streamed live)
        env:
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
        run: |
          {
            echo "[security] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

            echo "[security] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1

            echo "[security] === pip install bandit ==="
            pip install bandit 2>&1

            echo "[security] === bandit scan ==="
            bandit -r /tmp/repo/src/ -f txt 2>&1 || true

            echo "[security] === hardcoded secrets check ==="
            PATTERNS="password=|secret=|api_key=|token=|private_key="
            grep -rniE "$PATTERNS" /tmp/repo/src/ 2>/dev/null || echo "  No matches found"

            echo "[security] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } | python3 /tmp/ably_send.py

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security
    steps:

      - name: Install Ably Client
        run: |
          pip install -q ably
          echo "$ABLY_SEND_SCRIPT" > /tmp/ably_send.py

      - name: Run Deploy (streamed live)
        env:
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
        run: |
          {
            echo "[deploy] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

            echo "[deploy] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1

            echo "[deploy] === validate config ==="
            ERRORS=0
            for required in src/app.py src/utils.py requirements.txt; do
              if [ ! -f "/tmp/repo/$required" ]; then
                echo "  MISSING: $required"
                ERRORS=$((ERRORS + 1))
              fi
            done
            if [ "$ERRORS" -eq 0 ]; then
              echo "  All required files present. Validation PASSED"
            fi

            echo "[deploy] === package artifact ==="
            ARTIFACT="/tmp/release-${{ github.run_number }}.tar.gz"
            tar -czf "$ARTIFACT" -C /tmp/repo src/ requirements.txt README.md 2>&1
            SIZE=$(du -sh "$ARTIFACT" | cut -f1)
            FILE_COUNT=$(tar -tzf "$ARTIFACT" | wc -l | tr -d ' ')
            echo "  Artifact: $ARTIFACT"
            echo "  Size: $SIZE"
            echo "  Files: $FILE_COUNT"

            echo "[deploy] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S') — DEPLOY READY"
          } | python3 /tmp/ably_send.py

      - name: Keep Alive
        run: sleep 60
