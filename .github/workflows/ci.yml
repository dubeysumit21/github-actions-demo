name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  WEBHOOK_URL: https://webhook.site/45a3accb-16a6-47e2-a931-6ae0cdbc20d4

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:

      - name: Notify Start
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[lint] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Run Lint
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          pip install flake8 black -q

          LOGS="[lint] Results as of $(date '+%H:%M:%S')\n"

          FLAKE=$(flake8 /tmp/repo/src/ --max-line-length=120 2>&1 || true)
          if [ -z "$FLAKE" ]; then
            LOGS="${LOGS}  flake8: PASSED\n"
          else
            LOGS="${LOGS}  flake8: $FLAKE\n"
          fi

          BLACK=$(black --check /tmp/repo/src/ 2>&1 || true)
          LOGS="${LOGS}  black: $BLACK\n"

          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "$LOGS"

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:

      - name: Notify Start
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[build] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Run Build
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          pip install -r /tmp/repo/requirements.txt -q

          LOGS="[build] Results as of $(date '+%H:%M:%S')\n"

          for f in src/app.py src/utils.py tests/test_app.py tests/test_utils.py requirements.txt; do
            if [ -f "/tmp/repo/$f" ]; then
              LOGS="${LOGS}  structure: FOUND $f\n"
            else
              LOGS="${LOGS}  structure: MISSING $f\n"
            fi
          done

          IMPORT=$(cd /tmp/repo && python3 -c "from src.app import add, subtract, multiply, divide; from src.utils import is_even, clamp, flatten; print('All imports OK')" 2>&1)
          LOGS="${LOGS}  imports: $IMPORT\n"

          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "$LOGS"

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Notify Start
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[test] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Run Tests
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          pip install -r /tmp/repo/requirements.txt -q

          cd /tmp/repo
          PYTEST=$(python3 -m pytest tests/ -v 2>&1)
          PASSED=$(echo "$PYTEST" | grep -c "PASSED" || true)
          FAILED=$(echo "$PYTEST" | grep -c "FAILED" || true)
          COVERAGE=$(python3 -m pytest tests/ --cov=src --cov-report=term-missing 2>&1 | grep "TOTAL" | awk '{print $NF}' || echo "unknown")

          LOGS="[test] Results as of $(date '+%H:%M:%S')\n"
          LOGS="${LOGS}  unit tests: $PASSED passed, $FAILED failed\n"
          LOGS="${LOGS}  coverage: $COVERAGE\n"

          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "$LOGS"

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — SECURITY
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Notify Start
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[security] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Run Security Scan
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo
          pip install bandit -q

          ISSUES=$(bandit -r /tmp/repo/src/ -f txt 2>&1 | grep "Issue:" | wc -l | tr -d ' ')
          PATTERNS="password=|secret=|api_key=|token=|private_key="
          HITS=$(grep -rniE "$PATTERNS" /tmp/repo/src/ 2>/dev/null | wc -l | tr -d ' ')

          LOGS="[security] Results as of $(date '+%H:%M:%S')\n"
          LOGS="${LOGS}  bandit issues: $ISSUES\n"
          LOGS="${LOGS}  hardcoded secret patterns: $HITS\n"

          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "$LOGS"

      - name: Keep Alive
        run: sleep 60

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security
    steps:

      - name: Notify Start
        run: |
          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL \
            -d "[deploy] STARTED at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Run Deploy
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo

          LOGS="[deploy] Results as of $(date '+%H:%M:%S')\n"

          ERRORS=0
          for required in src/app.py src/utils.py requirements.txt; do
            if [ ! -f "/tmp/repo/$required" ]; then
              LOGS="${LOGS}  validation: MISSING $required\n"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -eq 0 ]; then
            LOGS="${LOGS}  validation: PASSED\n"
          fi

          ARTIFACT="/tmp/release-${{ github.run_number }}.tar.gz"
          tar -czf "$ARTIFACT" -C /tmp/repo src/ requirements.txt README.md
          SIZE=$(du -sh "$ARTIFACT" | cut -f1)
          FILE_COUNT=$(tar -tzf "$ARTIFACT" | wc -l | tr -d ' ')
          LOGS="${LOGS}  artifact: $ARTIFACT | size: $SIZE | files: $FILE_COUNT\n"
          LOGS="${LOGS}  status: DEPLOY READY\n"

          curl -s -w " → HTTP %{http_code}" -X POST $WEBHOOK_URL -d "$LOGS"

      - name: Keep Alive
        run: sleep 60
