name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# POC socket target: PieSocket's public WebSocket test channel (swap SOCKET_URL
# for your real staging web app's WebSocket endpoint once it exists).
env:
  SOCKET_URL: "wss://demo.piesocket.com/v3/gh-actions-demo-sumitkumardubey?api_key=VCXCEuvhGcBDP7XhiJJUDvR1e1D3eiVjgZ9VRiaV&notify_self=1"
  WS_SEND_SCRIPT: |
    import asyncio
    import os
    import sys
    import websockets

    async def main():
        uri = os.environ["SOCKET_URL"]
        async with websockets.connect(uri) as ws:
            for line in sys.stdin:
                line = line.rstrip("\n")
                if line:
                    await ws.send(line)

    asyncio.run(main())

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:

      - name: Install WebSocket Client
        run: |
          pip install -q websockets
          echo "$WS_SEND_SCRIPT" > /tmp/ws_send.py

      - name: Notify Start
        run: |
          echo "[lint] STARTED at $(date '+%Y-%m-%d %H:%M:%S')" | python3 /tmp/ws_send.py

      - name: Run Lint
        run: |
          {
            echo "[lint] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1
            echo ""

            echo "[lint] === pip install flake8 black ==="
            pip install flake8 black 2>&1
            echo ""

            echo "[lint] === flake8 ==="
            flake8 /tmp/repo/src/ --max-line-length=120 2>&1 || true
            echo ""

            echo "[lint] === black check ==="
            black --check /tmp/repo/src/ 2>&1 || true
            echo ""

            echo "[lint] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } > /tmp/job_logs.txt

      - name: Keep Alive
        run: sleep 60

      - name: Send Logs
        run: python3 /tmp/ws_send.py < /tmp/job_logs.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:

      - name: Install WebSocket Client
        run: |
          pip install -q websockets
          echo "$WS_SEND_SCRIPT" > /tmp/ws_send.py

      - name: Notify Start
        run: |
          echo "[build] STARTED at $(date '+%Y-%m-%d %H:%M:%S')" | python3 /tmp/ws_send.py

      - name: Run Build
        run: |
          {
            echo "[build] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1
            echo ""

            echo "[build] === pip install dependencies ==="
            pip install -r /tmp/repo/requirements.txt 2>&1
            echo ""

            echo "[build] === project structure check ==="
            for f in src/app.py src/utils.py tests/test_app.py tests/test_utils.py requirements.txt; do
              if [ -f "/tmp/repo/$f" ]; then
                echo "  FOUND: $f"
              else
                echo "  MISSING: $f"
              fi
            done
            echo ""

            echo "[build] === import check ==="
            cd /tmp/repo && python3 -c "from src.app import add, subtract, multiply, divide; from src.utils import is_even, clamp, flatten; print('All imports OK')" 2>&1
            echo ""

            echo "[build] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } > /tmp/job_logs.txt

      - name: Keep Alive
        run: sleep 60

      - name: Send Logs
        run: python3 /tmp/ws_send.py < /tmp/job_logs.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Install WebSocket Client
        run: |
          pip install -q websockets
          echo "$WS_SEND_SCRIPT" > /tmp/ws_send.py

      - name: Notify Start
        run: |
          echo "[test] STARTED at $(date '+%Y-%m-%d %H:%M:%S')" | python3 /tmp/ws_send.py

      - name: Run Tests
        run: |
          {
            echo "[test] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1
            echo ""

            echo "[test] === pip install ==="
            pip install -r /tmp/repo/requirements.txt 2>&1
            echo ""

            echo "[test] === pytest ==="
            cd /tmp/repo && python3 -m pytest tests/ -v 2>&1
            echo ""

            echo "[test] === coverage ==="
            cd /tmp/repo && python3 -m pytest tests/ --cov=src --cov-report=term-missing 2>&1
            echo ""

            echo "[test] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } > /tmp/job_logs.txt

      - name: Keep Alive
        run: sleep 60

      - name: Send Logs
        run: python3 /tmp/ws_send.py < /tmp/job_logs.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — SECURITY
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Install WebSocket Client
        run: |
          pip install -q websockets
          echo "$WS_SEND_SCRIPT" > /tmp/ws_send.py

      - name: Notify Start
        run: |
          echo "[security] STARTED at $(date '+%Y-%m-%d %H:%M:%S')" | python3 /tmp/ws_send.py

      - name: Run Security Scan
        run: |
          {
            echo "[security] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1
            echo ""

            echo "[security] === pip install bandit ==="
            pip install bandit 2>&1
            echo ""

            echo "[security] === bandit scan ==="
            bandit -r /tmp/repo/src/ -f txt 2>&1 || true
            echo ""

            echo "[security] === hardcoded secrets check ==="
            PATTERNS="password=|secret=|api_key=|token=|private_key="
            grep -rniE "$PATTERNS" /tmp/repo/src/ 2>/dev/null || echo "  No matches found"
            echo ""

            echo "[security] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S')"
          } > /tmp/job_logs.txt

      - name: Keep Alive
        run: sleep 60

      - name: Send Logs
        run: python3 /tmp/ws_send.py < /tmp/job_logs.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security
    steps:

      - name: Install WebSocket Client
        run: |
          pip install -q websockets
          echo "$WS_SEND_SCRIPT" > /tmp/ws_send.py

      - name: Notify Start
        run: |
          echo "[deploy] STARTED at $(date '+%Y-%m-%d %H:%M:%S')" | python3 /tmp/ws_send.py

      - name: Run Deploy
        run: |
          {
            echo "[deploy] === git clone ==="
            git clone --depth 1 "https://github.com/${{ github.repository }}.git" /tmp/repo 2>&1
            echo ""

            echo "[deploy] === validate config ==="
            ERRORS=0
            for required in src/app.py src/utils.py requirements.txt; do
              if [ ! -f "/tmp/repo/$required" ]; then
                echo "  MISSING: $required"
                ERRORS=$((ERRORS + 1))
              fi
            done
            if [ "$ERRORS" -eq 0 ]; then
              echo "  All required files present. Validation PASSED"
            fi
            echo ""

            echo "[deploy] === package artifact ==="
            ARTIFACT="/tmp/release-${{ github.run_number }}.tar.gz"
            tar -czf "$ARTIFACT" -C /tmp/repo src/ requirements.txt README.md 2>&1
            SIZE=$(du -sh "$ARTIFACT" | cut -f1)
            FILE_COUNT=$(tar -tzf "$ARTIFACT" | wc -l | tr -d ' ')
            echo "  Artifact: $ARTIFACT"
            echo "  Size: $SIZE"
            echo "  Files: $FILE_COUNT"
            echo ""

            echo "[deploy] COMPLETED at $(date '+%Y-%m-%d %H:%M:%S') — DEPLOY READY"
          } > /tmp/job_logs.txt

      - name: Keep Alive
        run: sleep 60

      - name: Send Logs
        run: python3 /tmp/ws_send.py < /tmp/job_logs.txt
