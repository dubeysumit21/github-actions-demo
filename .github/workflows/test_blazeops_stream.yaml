name: TEST - blazeops backend log streaming (throwaway)

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # job-level so every step's stream_log.py invocation can see these,
      # not just the step that originally set them
      BLAZEOPS_BASE_URL: "https://lushly-periscope-hurray.ngrok-free.dev"
      API_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJvcmdhbml6YXRpb25faWQiOjIsInByb2plY3RfaWQiOjEsInNlY3JldF9rZXkiOiJwOGthcU5OZmZCZFlrN1JMc3ZiTktyRjhmYVIzNHBNZy1iU2VxRVo1TTg4IiwiaWF0IjoxNzgyMzYzMDU3LCJ0eXBlIjoiYWdlbnRfYXBpX2tleSJ9.sSWFBJKl4ESM8WjEzND2UE7Xnnk0-I3oxYSkoVTqMdk"
      DEPLOYMENT_ID: "13"
    defaults:
      run:
        shell: /tmp/stream_wrapper.sh {0}
    steps:
      - name: Setup log streaming
        shell: bash
        run: |
          pip install -q "python-socketio[client]" websocket-client

          cat > /tmp/stream_log.py << 'PYEOF'
          import os
          import sys
          import socketio

          sio = socketio.Client()
          try:
              sio.connect(
                  os.environ["BLAZEOPS_BASE_URL"],
                  auth={
                      "api_key": os.environ.get("API_KEY", ""),
                      "deployment_id": os.environ.get("DEPLOYMENT_ID", ""),
                  },
                  wait_timeout=10,
              )
              print(f"[stream] connected: {sio.connected}", file=sys.stderr)
          except Exception as exc:
              print(f"[stream] connect failed: {exc}", file=sys.stderr)
              sio = None

          for raw_line in sys.stdin:
              line = raw_line.rstrip("\n")
              print(line)
              if sio is not None and sio.connected and line.strip():
                  try:
                      sio.emit("gha_log_line", {"line": line})
                  except Exception as exc:
                      print(f"[stream] emit failed: {exc}", file=sys.stderr)

          if sio is not None and sio.connected:
              sio.disconnect()
          PYEOF

          cat > /tmp/stream_wrapper.sh << 'SHEOF'
          #!/bin/bash
          bash "$1" 2>&1 | python3 /tmp/stream_log.py
          exit ${PIPESTATUS[0]}
          SHEOF
          chmod +x /tmp/stream_wrapper.sh

      - name: Fake work
        run: |
          STEP="checkout-infra"
          echo "[job:$GITHUB_JOB step:$STEP] Checking out infra repository..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] AWS credentials configured for region us-east-1"
          sleep 1

          STEP="provision-infra"
          echo "[job:$GITHUB_JOB step:$STEP] Initializing OpenTofu backend..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] OpenTofu initialized successfully"
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] Running terraform plan..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] Plan: 8 to add, 0 to change, 0 to destroy"
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] Applying infrastructure changes..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] aws_s3_bucket.tf_state: Creating..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] aws_instance.agent: Creating..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] aws_ecr_repository.agent: Creating..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] aws_instance.agent: Still creating... [10s elapsed]"
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] aws_instance.agent: Creation complete after 12s"
          sleep 1

          STEP="wait-for-ec2"
          echo "[job:$GITHUB_JOB step:$STEP] Waiting for EC2 instance to boot..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] EC2 instance is now reachable via SSH"
          sleep 1

          STEP="ecr-login"
          echo "[job:$GITHUB_JOB step:$STEP] Logging into Amazon ECR..."
          sleep 1

          STEP="docker-build-push"
          echo "[job:$GITHUB_JOB step:$STEP] Building Docker image blazeops-agent:latest..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] Pushing image to ECR repository..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] Image pushed successfully"
          sleep 1

          STEP="deploy-ec2"
          echo "[job:$GITHUB_JOB step:$STEP] Deploying container to EC2 instance..."
          sleep 1
          echo "[job:$GITHUB_JOB step:$STEP] Container blazeops-agent is running successfully!"

      - name: Fake failure (should be reported as failed)
        run: |
          echo "about to fail on purpose"
          exit 1
